<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #0A0A0A;
    color: #FAF7F2;
    font-family: "Inter", system-ui, sans-serif;
    position: relative;
    padding: 64px 80px;
    box-sizing: border-box;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(750px 420px at 90% -10%, rgba(255,214,10,0.22), transparent 60%),
      radial-gradient(620px 360px at -10% 110%, rgba(255,214,10,0.10), transparent 60%);
  }
  .top {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
  }
  .mark {
    font-weight: 800; font-size: 26px; letter-spacing: -0.025em;
  }
  .mark .dot { color: #FFD60A; }
  .status {
    display: flex; align-items: center; gap: 10px;
    font-size: 14px; font-weight: 700;
    color: rgba(250, 247, 242, 0.7);
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .status::before {
    content: ""; width: 12px; height: 12px; border-radius: 50%; background: #2ea44f;
  }
  .center {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; justify-content: center;
  }
  .name {
    font-weight: 900;
    font-size: 200px;
    line-height: 0.9;
    letter-spacing: -0.055em;
    color: #FAF7F2;
    margin-bottom: 22px;
  }
  .name .dot { color: #FFD60A; }
  .tag {
    font-weight: 500;
    font-size: 30px;
    line-height: 1.3;
    color: rgba(250, 247, 242, 0.78);
    letter-spacing: -0.012em;
    max-width: 980px;
  }
  .bottom {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 18px; font-weight: 700; letter-spacing: -0.005em;
  }
  .url { color: #FFD60A; }
  .email { color: rgba(250, 247, 242, 0.65); }
</style>
</head>
<body>

<div class="top">
  <div class="mark">Neil Busque<span class="dot">.</span></div>
  <div class="status">Available</div>
</div>

<div class="center">
  <div class="name">Neil Busque<span class="dot">.</span></div>
  <div class="tag">Director of Operations. Growth ops, AI, automation. Elizabeth, NJ — open to roles &amp; project work.</div>
</div>

<div class="bottom">
  <span class="url">busqueneil.com</span>
  <span class="email">neil@busqueneil.com</span>
</div>

</body>
</html>
