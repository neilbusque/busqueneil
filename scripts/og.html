<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }
  body {
    background: #FAF7F2;
    font-family: "Inter", system-ui, sans-serif;
    color: #0A0A0A;
    display: grid;
    grid-template-rows: 1fr auto;
    padding: 64px 80px;
    box-sizing: border-box;
    position: relative;
  }
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(700px 380px at 90% -10%, rgba(245,184,0,0.14), transparent 60%),
      radial-gradient(620px 360px at -10% 110%, rgba(10,10,10,0.05), transparent 60%);
  }
  .corner {
    position: absolute;
    top: 56px;
    left: 80px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: "Inter", sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.018em;
  }
  .corner .dot { color: #F5B800; }
  .status {
    position: absolute;
    top: 64px;
    right: 80px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 16px;
    font-weight: 600;
    color: #6E6657;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .status::before {
    content: "";
    width: 12px; height: 12px;
    border-radius: 50%;
    background: #2ea44f;
    display: inline-block;
  }
  .name {
    align-self: end;
    font-family: "Inter", sans-serif;
    font-weight: 900;
    font-size: 210px;
    line-height: 0.92;
    letter-spacing: -0.045em;
    margin-bottom: 22px;
    position: relative;
    z-index: 1;
    color: #0A0A0A;
  }
  .name .dot { color: #F5B800; }
  .tagline {
    font-family: "Inter", sans-serif;
    font-weight: 500;
    font-size: 32px;
    line-height: 1.3;
    color: #2A2620;
    max-width: 980px;
    letter-spacing: -0.01em;
    position: relative;
    z-index: 1;
  }
  .foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
    font-family: "Inter", sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: #6E6657;
    letter-spacing: -0.005em;
    position: relative;
    z-index: 1;
  }
  .url { color: #0A0A0A; }
</style>
</head>
<body>

<div class="corner">
  Neil Busque<span class="dot">.</span>
</div>

<div class="status">Available</div>

<div>
  <div class="name">Neil Busque<span class="dot">.</span></div>
  <div class="tagline">
    Director of Operations. Growth ops, AI, automation. Elizabeth, NJ — open to roles &amp; project work.
  </div>
</div>

<div class="foot">
  <span class="url">busqueneil.com</span>
  <span>busqueneil@gmail.com</span>
</div>

</body>
</html>
