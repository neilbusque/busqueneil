<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #FFFFFF;
    color: #0A0A0A;
    font-family: "Inter", system-ui, sans-serif;
    position: relative;
    padding: 64px 80px;
    box-sizing: border-box;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }
  body::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(800px 500px at 100% -10%, rgba(58,111,181,0.16), transparent 60%),
      radial-gradient(600px 400px at -10% 110%, rgba(58,111,181,0.06), transparent 60%);
  }
  .top {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
  }
  .mark {
    font-weight: 900; font-size: 22px; letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .mark .a { color: #3A6FB5; }
  .mark .b { color: #0A0A0A; }
  .status {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; font-weight: 700;
    color: #1F2937;
    letter-spacing: 0.14em; text-transform: uppercase;
    background: rgba(255,255,255,0.9);
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid #E5E9EF;
    box-shadow: 0 1px 2px rgba(15,23,42,0.04);
  }
  .status::before {
    content: ""; width: 10px; height: 10px; border-radius: 50%; background: #2EA44F;
  }
  .center {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; justify-content: center;
  }
  .name {
    font-weight: 900;
    font-size: 200px;
    line-height: 0.9;
    letter-spacing: -0.055em;
    color: #0A0A0A;
    margin-bottom: 22px;
  }
  .name .dot { color: #3A6FB5; }
  .tag {
    font-weight: 500;
    font-size: 30px;
    line-height: 1.3;
    color: #1F2937;
    letter-spacing: -0.012em;
    max-width: 980px;
  }
  .bottom {
    position: relative; z-index: 1;
    display: flex; align-items: center; justify-content: space-between;
    font-size: 18px; font-weight: 700; letter-spacing: -0.005em;
  }
  .url { color: #3A6FB5; }
  .email { color: #6B7280; }
</style>
</head>
<body>

<div class="top">
  <div class="mark"><span class="a">BUSQUE</span><span class="b">NEIL</span></div>
  <div class="status">Available for work</div>
</div>

<div class="center">
  <div class="name">Neil Busque<span class="dot">.</span></div>
  <div class="tag">I build the AI agents, funnels, and automations that turn ad spend into booked calls. Elizabeth, NJ.</div>
</div>

<div class="bottom">
  <span class="url">busqueneil.com</span>
  <span class="email">neil@busqueneil.com</span>
</div>

</body>
</html>
