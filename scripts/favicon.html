<!DOCTYPE html>
<html><head><meta charset="utf-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    width: 512px; height: 512px;
    background: #FFFFFF;
    display: flex; align-items: center; justify-content: center;
    font-family: "Inter", sans-serif;
    position: relative;
  }
  .ring {
    position: absolute;
    inset: 24px;
    border-radius: 96px;
    background: linear-gradient(140deg, #3A6FB5 0%, #1F4475 100%);
  }
  .mark {
    position: relative;
    color: #FFFFFF;
    font-weight: 900;
    font-size: 290px;
    letter-spacing: -0.04em;
    line-height: 1;
    display: inline-flex;
    align-items: baseline;
  }
  .dot { color: #FFFFFF; font-size: 0.45em; line-height: 1; transform: translate(0.04em, 0em); }
</style>
</head>
<body>
  <div class="ring"></div>
  <div class="mark">N<span class="dot">.</span></div>
</body>
</html>
